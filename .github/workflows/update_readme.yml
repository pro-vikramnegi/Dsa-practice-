name: DSA Forge — Auto Sync

on:
  push:
    paths:
      - "problems.csv"
  workflow_dispatch:          # manual trigger from GitHub UI
  schedule:
    - cron: "30 18 * * *"    # daily at 00:00 IST (18:30 UTC)

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run generate_readme.py
        run: python generate_readme.py

      - name: Commit & push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md heatmap.svg targets.svg
          git diff --cached --quiet || git commit -m "chore: auto-sync DSA stats [skip ci]"
          git push
          
