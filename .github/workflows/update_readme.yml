name: DSA Forge Pro Sync

on:
  push:
    paths:
      - "problems.csv"
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Script
        run: python generate_readme.py
      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md heatmap.svg targets.svg
          git diff --cached --quiet || (git commit -m "chore: pro-sync stats" && git push)
          
