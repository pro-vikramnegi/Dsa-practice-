name: Update README

on:
  push:
    paths:
      - 'problems.csv'   # sirf CSV change hone pe trigger ho

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install deps
        run: pip install pandas
      - name: Run script
        run: python generate_readme.py
      - name: Commit README
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "chore: auto-update README from CSV" || echo "No changes"
          git push
